<div class="app-shell" [class.with-sidebar]="showTopbar()" [class.mobile-sheet-open]="mobileMenuOpen">
  <aside *ngIf="showTopbar()" class="sidebar">

    <nav class="sidebar-nav">
      <a mat-button class="nav-link text-label" routerLink="/namePicker" routerLinkActive="active-link">NamePicker</a>
      <a mat-button class="nav-link text-label" routerLink="/history" routerLinkActive="active-link">History</a>
      <a mat-button class="nav-link text-label" routerLink="/stats" routerLinkActive="active-link">Stats</a>
    </nav>
  </aside>

  <main class="main-layout">
    <header *ngIf="showTopbar()" class="content-topbar">
      <span class="wtm-mark">WTM</span>
      <div class="account-side">
        <span class="account-name text-label">{{ accountName }}</span>
        <button mat-flat-button class="logout-topbar-btn text-label" type="button" (click)="logout()">Logout</button>
      </div>
      <button
        type="button"
        class="mobile-menu-btn"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-controls="mobile-nav-sheet"
        aria-label="Apri menu"
        (click)="toggleMobileMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div
      *ngIf="showTopbar()"
      class="mobile-sheet-backdrop"
      [class.open]="mobileMenuOpen"
      (click)="closeMobileMenu()"
      aria-hidden="true"
    ></div>

    <section *ngIf="showTopbar()" id="mobile-nav-sheet" class="mobile-nav-sheet" [class.open]="mobileMenuOpen">
      <div class="mobile-sheet-header">
        <span class="account-name text-label">{{ accountName }}</span>
      </div>
      <nav class="mobile-sheet-nav">
        <a mat-button class="mobile-sheet-link text-label" routerLink="/history" routerLinkActive="active-link" (click)="closeMobileMenu()">History</a>
        <a mat-button class="mobile-sheet-link text-label" routerLink="/stats" routerLinkActive="active-link" (click)="closeMobileMenu()">Stats</a>
        <button mat-flat-button class="mobile-sheet-logout text-label" type="button" (click)="logout()">Logout</button>
      </nav>
    </section>

    <router-outlet></router-outlet>
  </main>
</div>
